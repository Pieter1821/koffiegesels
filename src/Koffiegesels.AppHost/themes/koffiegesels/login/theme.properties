# Koffiegesels login theme — extends the stock Keycloak 26 (PatternFly 5) theme
# and layers brand CSS on top. Each file in `styles` is resolved up the parent
# chain individually, so `css/styles.css` still loads from keycloak.v2 while
# `css/koffiegesels.css` (ours) is applied last as overrides.
parent=keycloak.v2
import=common/keycloak

styles=css/styles.css css/koffiegesels.css

meta=viewport==width=device-width,initial-scale=1
